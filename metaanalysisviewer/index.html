<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaVis — Meta-Analysis Visualizer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
</head>
<body>
  <div class="noise-overlay"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">M</span>
        <div class="logo-text">
          <span class="logo-title">MetaVis</span>
          <span class="logo-sub">Meta-Analysis Visualizer</span>
        </div>
      </div>
      <div class="header-controls">
        <button class="theme-toggle" id="themeToggle" title="ライト/ダーク切替">
          <!-- moon icon (shown in dark mode) -->
          <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
          </svg>
          <!-- sun icon (shown in light mode, hidden by default) -->
          <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <label class="file-upload-btn" for="csvInput">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
          CSV読み込み
        </label>
        <input type="file" id="csvInput" accept=".csv" hidden>
        <button class="export-btn" id="exportBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          PNG保存
        </button>
      </div>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="forest">
          <span class="tab-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
              <circle cx="8" cy="6" r="2.5" fill="currentColor"/><circle cx="14" cy="12" r="2.5" fill="currentColor"/><circle cx="10" cy="18" r="2.5" fill="currentColor"/>
            </svg>
          </span>
          <span>Forest Plot</span>
        </button>
        <button class="tab-btn" data-tab="funnel">
          <span class="tab-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 2L3 20h18L12 2z"/>
              <line x1="7" y1="13" x2="17" y2="13"/>
            </svg>
          </span>
          <span>Funnel Plot</span>
        </button>
        <button class="tab-btn" data-tab="sensitivity">
          <span class="tab-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </span>
          <span>Sensitivity</span>
        </button>
      </nav>

      <div class="settings-panel">
        <h3 class="settings-title">設定</h3>

        <div class="setting-group">
          <label>解析モデル</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="model" value="fixed" id="fixedModel">
              <span>Fixed Effect</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="model" value="random" id="randomModel" checked>
              <span>Random Effect</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <label>効果量の種類</label>
          <select id="effectMeasure">
            <option value="OR">Odds Ratio (OR)</option>
            <option value="RR">Risk Ratio (RR)</option>
            <option value="RD">Risk Difference (RD)</option>
          </select>
        </div>

        <div class="setting-group" id="forestSettings">
          <label>信頼区間</label>
          <select id="ciLevel">
            <option value="1.96">95%</option>
            <option value="1.645">90%</option>
            <option value="2.576">99%</option>
          </select>
        </div>

        <div class="setting-group">
          <label>ダイヤモンド表示</label>
          <label class="toggle">
            <input type="checkbox" id="showDiamond" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="setting-group" id="sensitivitySettings" style="display:none">
          <label>除外閾値 (SE)</label>
          <input type="range" id="seThreshold" min="0.1" max="0.5" step="0.01" value="0.3">
          <span id="seThresholdVal">0.30</span>
        </div>
      </div>

      <div class="stats-panel" id="statsPanel">
        <h3 class="settings-title">統計量</h3>
        <div class="stat-row"><span class="stat-label">効果量種別</span><span class="stat-value" id="statMeasure">—</span></div>
        <div class="stat-row"><span class="stat-label">プール効果量</span><span class="stat-value" id="statPooled">—</span></div>
        <div class="stat-row"><span class="stat-label">95% CI</span><span class="stat-value" id="statCI">—</span></div>
        <div class="stat-row"><span class="stat-label">I²</span><span class="stat-value" id="statI2">—</span></div>
        <div class="stat-row"><span class="stat-label">τ²</span><span class="stat-value" id="statTau2">—</span></div>
        <div class="stat-row"><span class="stat-label">Q統計量</span><span class="stat-value" id="statQ">—</span></div>
        <div class="stat-row"><span class="stat-label">p (Q)</span><span class="stat-value" id="statPQ">—</span></div>
        <div class="stat-row"><span class="stat-label">研究数</span><span class="stat-value" id="statN">—</span></div>
      </div>
    </aside>

    <section class="canvas-area">
      <div class="canvas-header">
        <h2 class="plot-title" id="plotTitle">Forest Plot</h2>
        <span class="data-badge" id="dataBadge">sample data</span>
      </div>
      <div class="canvas-wrapper">
        <canvas id="plotCanvas"></canvas>
        <div class="tooltip" id="tooltip"></div>
      </div>
      <div class="canvas-footer">
        <p class="footnote" id="footnote">効果量と95%信頼区間。■のサイズは研究のウェイトに比例。◆はプール効果量を示す。</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
