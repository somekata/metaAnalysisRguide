<!doctype html>
<html lang="ja" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaCSVBuilder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <!-- ══ Header ══ -->
      <header>
        <div class="header-left">
          <div class="logo">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <polygon
                points="10,1 18.66,6 18.66,14 10,19 1.34,14 1.34,6"
                stroke="currentColor"
                stroke-width="1.6"
                fill="none"
              />
              <circle cx="10" cy="10" r="2.8" fill="currentColor" />
            </svg>
            <span class="logo-text">MetaCSVBuilder</span>
          </div>
          <div class="storage-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">0 件</span>
          </div>
        </div>

        <div class="header-center">
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="include">Include</button>
            <button class="filter-btn" data-filter="exclude">Exclude</button>
          </div>
        </div>

        <div class="header-right">
          <button
            class="icon-btn"
            id="undoBtn"
            title="元に戻す (Ctrl+Z)"
            disabled
          >
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path
                d="M3.5 4.5H9a3.5 3.5 0 0 1 0 7H4.5"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
              />
              <path
                d="M3.5 2.5 1.5 4.5l2 2"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            class="icon-btn"
            id="redoBtn"
            title="やり直す (Ctrl+Y)"
            disabled
          >
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path
                d="M11.5 4.5H6a3.5 3.5 0 0 0 0 7h4.5"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
              />
              <path
                d="M11.5 2.5l2 2-2 2"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <div class="sep"></div>
          <button class="icon-btn" id="themeBtn" title="ダーク/ライト切替">
            <svg
              id="iconSun"
              width="15"
              height="15"
              viewBox="0 0 15 15"
              fill="none"
            >
              <circle
                cx="7.5"
                cy="7.5"
                r="2.5"
                stroke="currentColor"
                stroke-width="1.3"
              />
              <path
                d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.93 2.93l1.06 1.06M11.01 11.01l1.06 1.06M2.93 12.07l1.06-1.06M11.01 3.99l1.06-1.06"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              />
            </svg>
            <svg
              id="iconMoon"
              width="15"
              height="15"
              viewBox="0 0 15 15"
              fill="none"
              style="display: none"
            >
              <path
                d="M8 2.5A5.5 5.5 0 1 0 11 12a4 4 0 0 1-3-9.5z"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <div class="sep"></div>
          <button
            class="icon-btn danger-btn"
            id="clearStorageBtn"
            title="ストレージを消去"
          >
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path
                d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M3 3.5l.7 7.5a.5.5 0 0 0 .5.5h5.6a.5.5 0 0 0 .5-.5L11 3.5"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M5.5 6v3.5M8.5 6v3.5"
                stroke="currentColor"
                stroke-width="1.3"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <div class="sep"></div>
          <label class="hdr-btn" title="CSVをインポート">
            ↑ Import
            <input type="file" id="importFile" accept=".csv" hidden />
          </label>
          <div class="export-group">
            <button class="hdr-btn export-main" id="exportAllBtn">
              ↓ CSV
            </button>
            <button
              class="hdr-btn export-inc"
              id="exportIncBtn"
              title="Include行のみ CSV"
            >
              Inc のみ
            </button>
            <button
              class="hdr-btn export-html-btn"
              id="exportHtmlBtn"
              title="見やすいHTML表でエクスポート（印刷対応）"
            >
              ↓ HTML
            </button>
          </div>
          <button class="hdr-btn add-btn" id="addRowBtn">＋ 追加</button>
        </div>
      </header>

      <!-- ══ Column Name Bar ══ -->
      <div class="col-name-bar">
        <span class="col-label">列名変更</span>
        <div class="col-name-inputs" id="colNameInputs">
          <!-- fixed 4 cols -->
          <div class="col-name-item" data-key="evente">
            <span class="col-orig">evente</span><span class="arr">→</span
            ><input
              type="text"
              id="colEventE"
              placeholder="evente"
              maxlength="24"
            />
          </div>
          <div class="col-name-item" data-key="ne">
            <span class="col-orig">ne</span><span class="arr">→</span
            ><input type="text" id="colNe" placeholder="ne" maxlength="24" />
          </div>
          <div class="col-name-item" data-key="eventc">
            <span class="col-orig">eventc</span><span class="arr">→</span
            ><input
              type="text"
              id="colEventC"
              placeholder="eventc"
              maxlength="24"
            />
          </div>
          <div class="col-name-item" data-key="nc">
            <span class="col-orig">nc</span><span class="arr">→</span
            ><input type="text" id="colNc" placeholder="nc" maxlength="24" />
          </div>
        </div>
        <button class="reset-col-btn" id="resetColBtn">リセット</button>
        <div class="sep"></div>
        <button
          class="hdr-btn add-col-btn"
          id="addColBtn"
          title="カスタム列を追加"
        >
          ＋ 列追加
        </button>
      </div>

      <!-- ══ Table ══ -->
      <div class="table-wrapper">
        <div class="table-scroll">
          <table id="mainTable">
            <colgroup id="colgroup"></colgroup>
            <thead>
              <tr id="headerRow">
                <!-- built by JS -->
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect
                x="7"
                y="9"
                width="34"
                height="34"
                rx="4"
                stroke="currentColor"
                stroke-width="1.8"
              />
              <path
                d="M15 19h18M15 26h12M15 33h8"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <circle
                cx="36"
                cy="12"
                r="6"
                fill="currentColor"
                opacity=".1"
                stroke="currentColor"
                stroke-width="1.8"
              />
              <path
                d="M34 12h4M36 10v4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <p class="empty-title">データがありません</p>
          <p class="empty-sub">
            「＋ 追加」または Import ボタンから始めてください
          </p>
        </div>
      </div>
    </div>
    <!-- #app -->

    <!-- ══ Record Panel (full-screen overlay) ══ -->
    <div id="recPanel" class="rec-overlay" hidden>
      <div class="rec-panel">
        <div class="rec-header">
          <div class="rec-nav">
            <button class="rec-nav-btn" id="recPrev" title="前のレコード (←)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path
                  d="M10 3L5 8l5 5"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <span class="rec-pos" id="recPos">1 / 1</span>
            <button class="rec-nav-btn" id="recNext" title="次のレコード (→)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path
                  d="M6 3l5 5-5 5"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <div class="rec-title-wrap">
            <h2 class="rec-title" id="recTitle">レコード詳細</h2>
            <span class="rec-dirty" id="recDirty" hidden>● 未保存</span>
          </div>
          <div class="rec-header-right">
            <span class="rec-meta" id="recMeta"></span>
            <button class="rec-save-btn" id="recSaveBtn">
              保存 <kbd>Ctrl↵</kbd>
            </button>
            <button class="icon-btn" id="recClose" title="閉じる (Esc)">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path
                  d="M1 1l12 12M13 1L1 13"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="rec-body" id="recBody">
          <!-- Row 1: core fields -->
          <div class="rec-row">
            <div class="rec-field rec-field-sm">
              <label>Include</label>
              <label class="toggle-wrap"
                ><input type="checkbox" id="rfInclude" /><span
                  class="toggle"
                ></span
                ><span class="toggle-label" id="rfIncLabel"
                  >Include</span
                ></label
              >
            </div>
            <div class="rec-field rec-field-sm">
              <label>Year</label>
              <input
                type="number"
                id="rfYear"
                class="rf-input"
                placeholder="2024"
                min="1900"
                max="2100"
              />
            </div>
            <div class="rec-field rec-field-grow">
              <label>Study</label>
              <input
                type="text"
                id="rfStudy"
                class="rf-input"
                placeholder="例: Smith et al. 2023"
              />
            </div>
            <div class="rec-field">
              <label>Region</label>
              <input
                type="text"
                id="rfRegion"
                class="rf-input"
                placeholder="例: Japan"
              />
            </div>
          </div>

          <!-- Row 2: URL -->
          <div class="rec-row">
            <div class="rec-field rec-field-full">
              <label>URL</label>
              <div class="rf-url-row">
                <input
                  type="url"
                  id="rfUrl"
                  class="rf-input"
                  placeholder="https://..."
                />
                <a
                  id="rfUrlOpen"
                  href="#"
                  target="_blank"
                  rel="noopener"
                  class="rf-url-open"
                  title="URLを開く"
                  >↗ 開く</a
                >
              </div>
            </div>
          </div>

          <!-- Row 3: Notes -->
          <div class="rec-row">
            <div class="rec-field rec-field-full">
              <label>Notes</label>
              <textarea
                id="rfNotes"
                class="rf-textarea"
                placeholder="自由にメモを入力…"
                rows="5"
              ></textarea>
            </div>
          </div>

          <!-- Row 4: variable 4 cols -->
          <div class="rec-row" id="rfVarRow">
            <div class="rec-field">
              <label id="rfLabelEE">evente</label>
              <input
                type="number"
                id="rfEventE"
                class="rf-input rf-mono"
                placeholder="—"
              />
            </div>
            <div class="rec-field">
              <label id="rfLabelNe">ne</label>
              <input
                type="number"
                id="rfNe"
                class="rf-input rf-mono"
                placeholder="—"
              />
            </div>
            <div class="rec-field">
              <label id="rfLabelEC">eventc</label>
              <input
                type="number"
                id="rfEventC"
                class="rf-input rf-mono"
                placeholder="—"
              />
            </div>
            <div class="rec-field">
              <label id="rfLabelNc">nc</label>
              <input
                type="number"
                id="rfNc"
                class="rf-input rf-mono"
                placeholder="—"
              />
            </div>
          </div>

          <!-- Row 5: custom columns (filled by JS) -->
          <div class="rec-row" id="rfCustomRow"></div>
        </div>
        <!-- rec-body -->
      </div>
    </div>

    <!-- ══ Import Mode Dialog (3-choice) ══ -->
    <div id="importModeDialog" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">インポート方法を選択</h2>
        </div>
        <div class="modal-body">
          <p class="confirm-msg" id="importModeMsg"></p>
          <div class="import-mode-btns">
            <button class="import-mode-btn" id="importModeAppend">
              <span class="imb-icon">＋</span>
              <span class="imb-title">追記</span>
              <span class="imb-desc">既存データの末尾に追加する</span>
            </button>
            <button class="import-mode-btn" id="importModeReplace">
              <span class="imb-icon">↺</span>
              <span class="imb-title">差し替え</span>
              <span class="imb-desc">既存データをすべて置き換える</span>
            </button>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="importModeCancel">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- ══ Confirm Dialog ══ -->
    <div id="confirmDialog" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="confirmTitle">確認</h2>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" class="confirm-msg"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="confirmCancel">キャンセル</button>
          <button class="btn-danger" id="confirmOk">実行</button>
        </div>
      </div>
    </div>

    <!-- ══ Add Custom Column Dialog ══ -->
    <div id="addColDialog" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header"><h2 class="modal-title">列を追加</h2></div>
        <div class="modal-body">
          <div class="field-group">
            <label>列名（CSV ヘッダーになります）</label>
            <input
              type="text"
              id="newColName"
              class="rf-input"
              placeholder="例: dose, subgroup"
              maxlength="32"
              style="margin-top: 6px"
            />
          </div>
          <div class="field-group" style="margin-top: 10px">
            <label>型</label>
            <select id="newColType" class="rf-input" style="margin-top: 6px">
              <option value="text">テキスト</option>
              <option value="number">数値</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="addColCancel">キャンセル</button>
          <button class="btn-primary" id="addColOk">追加</button>
        </div>
      </div>
    </div>

    <!-- ══ HTML Preview / Print Dialog ══ -->
    <div id="htmlPreviewDialog" class="modal-overlay" hidden>
      <div class="modal modal-wide">

        <!-- top bar -->
        <div class="modal-header html-preview-header">
          <h2 class="modal-title">📋 HTMLプレビュー / 印刷</h2>
          <div class="html-preview-actions">
            <button class="btn-primary" id="htmlPrintBtn">🖨 印刷</button>
            <button class="btn-primary" id="htmlDlBtn" style="background:var(--accent2);">↓ HTML保存</button>
            <button class="btn-cancel"  id="htmlPreviewClose">閉じる</button>
          </div>
        </div>

        <!-- settings sidebar + iframe -->
        <div class="html-preview-body">

          <!-- ── left: settings panel ── -->
          <div class="html-preview-settings" id="htmlSettings">

            <div class="settings-section">
              <div class="settings-section-title">表示モード</div>
              <div class="settings-radio-group">
                <label class="settings-radio">
                  <input type="radio" name="htmlViewMode" value="table" checked> 表形式
                </label>
                <label class="settings-radio">
                  <input type="radio" name="htmlViewMode" value="card"> カード形式
                </label>
              </div>
            </div>

            <div class="settings-section">
              <div class="settings-section-title">行フィルター</div>
              <label class="settings-check">
                <input type="checkbox" id="htmlOptIncOnly">
                <span>Include 行のみ</span>
              </label>
            </div>

            <div class="settings-section">
              <div class="settings-section-title">用紙・向き</div>
              <div class="settings-radio-group">
                <label class="settings-radio">
                  <input type="radio" name="htmlPageSize" value="portrait"  checked> A4 縦
                </label>
                <label class="settings-radio">
                  <input type="radio" name="htmlPageSize" value="landscape"> A4 横
                </label>
              </div>
            </div>

            <div class="settings-section">
              <div class="settings-section-title">
                表示列
                <span class="col-toggle-all">
                  <button class="col-mini-btn" id="htmlColAll">全選択</button>
                  <button class="col-mini-btn" id="htmlColNone">解除</button>
                </span>
              </div>
              <div id="htmlColChecks" class="col-checks">
                <!-- built by JS -->
              </div>
            </div>

          </div><!-- /.html-preview-settings -->

          <!-- ── right: iframe preview ── -->
          <iframe id="htmlPreviewFrame" title="プレビュー"></iframe>

        </div><!-- /.html-preview-body -->
      </div>
    </div>

    <!-- ══ Toast ══ -->
    <div id="toast" class="toast" hidden></div>

    <script src="script.js"></script>
  </body>
</html>
